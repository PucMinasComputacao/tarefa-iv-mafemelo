<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>THE LOOK</title>
</head>
<body>
    <section class="global">
        <section class="sidebar">
            <aside>
                <h2>Menu</h2>
                <ul>
                    <li>Home</li>
                    <li>Favs</li>
                    <li>Quem Somos</li>
                    <li>Carrinho</li>
                    <li>Suporte</li>
                </ul>
            </aside>
        </section>


        <section class="principal">
            <header>
                <div class="header-escola">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <i class="fa-solid fa-basket-shopping"></i>
                    <i class="fa-solid fa-user"></i>
                    <i class="fa-regular fa-star"></i>
                </div>


                <div class="logo">
                    <h1>THE LOOK</h1>
                </div>
               
                <div class="header-direita">
                    <button>Login | Cadastro</button>
                </div>
            </header>


            <main>
                <section class="pesquisa">
                    <input type="text" placeholder="Pesquisar...">
                </section>


               
                <h3 class="titulo-central">Categorias</h3>
               
                <section class="grade-categorias">
                    <div class="item-categoria">Streetwear</div>
                    <div class="item-categoria">Casual</div>
                    <div class="item-categoria">Alfaiataria</div>
                    <div class="item-categoria">Noite</div>
                    <div class="item-categoria">Acessórios</div>
                    <div class="item-categoria">Calçados</div>
                    <div class="item-categoria">Boho Chic</div>
                    <div class="item-categoria">Sporty</div>
                </section>
            </main>


            <footer>
                <p>THELOOK | 2026</p>
            </footer>
        </section>
    </section>
</body>
</html>
